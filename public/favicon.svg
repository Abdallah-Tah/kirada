<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
    <defs>
        <linearGradient id="fav-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0EA5E9"/>
            <stop offset="60%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#67D3E6"/>
        </linearGradient>
    </defs>
    <rect width="48" height="48" rx="12" fill="#FFFFFF"/>
    <!-- Roof -->
    <path d="M8 24 L24 8 L40 24" fill="none" stroke="url(#fav-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Key bow (circle) -->
    <circle cx="14" cy="36" r="6" fill="none" stroke="url(#fav-grad)" stroke-width="3"/>
    <!-- Key stem + teeth -->
    <path d="M20 36 L40 36" fill="none" stroke="url(#fav-grad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M36 36 L36 40 M40 36 L40 40" fill="none" stroke="url(#fav-grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- House walls -->
    <path d="M10 24 L10 32" fill="none" stroke="url(#fav-grad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M38 24 L38 32" fill="none" stroke="url(#fav-grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Window panes (navy) -->
    <rect x="22" y="27" width="3.5" height="3.5" fill="#0F172A" rx="0.5"/>
    <rect x="27" y="27" width="3.5" height="3.5" fill="#0F172A" rx="0.5"/>
    <rect x="22" y="31.5" width="3.5" height="3.5" fill="#0F172A" rx="0.5"/>
    <rect x="27" y="31.5" width="3.5" height="3.5" fill="#0F172A" rx="0.5"/>
    <!-- Red star -->
    <path d="M17 29 L17.8 30.8 L19.8 31 L18.3 32.3 L18.8 34.3 L17 33.3 L15.2 34.3 L15.7 32.3 L14.2 31 L16.2 30.8 Z" fill="#EF4444"/>
</svg>
